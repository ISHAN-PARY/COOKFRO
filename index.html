<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookfro - Smart Pantry Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Cookfro Logo" class="logo">
    <h1>🍳 Cookfro</h1>
    <p>Add the ingredients you have and get recipe suggestions!</p>

    <!-- Input field and add button -->
    <input type="text" id="ingredientInput" placeholder="e.g. rice, egg, onion">
    <button onclick="addIngredient()">Add Ingredient</button>

    <!-- List of ingredients -->
    <ul id="ingredientList"></ul>

    <!-- Button to suggest recipes -->
    <button onclick="suggestRecipes()">Get Recipe Suggestions</button>

    <!-- Recipe suggestions -->
    <div id="recipeResult"></div>

    <!-- Shopping list -->
    <h2>Basic Shopping List</h2>
    <ul id="shoppingList"></ul>

  </div>

  <footer>
    &copy; 2026 Cookfro. All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
